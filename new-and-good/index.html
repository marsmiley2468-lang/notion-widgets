<!DOCTYPE html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "New And Good",
  "schemaVersion": 1,
  "description": "Daily uplifting content — Academia, Bellingham, Good News, YouTube. Option B: Sage & Stone theme. White pill backgrounds, full day+month date, multi-sentence summaries.",
  "mcpTools": [],
  "mcpServerNames": []
}
</script>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New + Good</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #2E3D34;
    color: #FFFFFF;
    padding: 0;
    width: 100%;
  }

  .widget-header {
    background: #38503E;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    border-bottom: 1px solid #4A6650;
  }
  .widget-header-dot { width: 8px; height: 8px; border-radius: 50%; background: #5EE8A0; flex-shrink: 0; }
  .widget-header-title {
    font-family: Georgia, serif;
    font-size: 14px;
    font-weight: bold;
    font-style: italic;
    letter-spacing: 0.06em;
    color: #FFFFFF;
  }
  .widget-header-date {
    margin-left: auto;
    font-family: Georgia, serif;
    font-size: 10px;
    font-style: italic;
    color: #5EE8A0;
  }

  .widget-body {
    background: #2E3D34;
    padding: 14px;
    width: 100%;
  }

  .card-list { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: #1A2620;
    border: 1px solid #2A3A30;
    border-radius: 10px;
    overflow: hidden;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px 10px;
  }

  /* White pill bg, colored text + border */
  .cat-pill {
    font-family: Georgia, serif;
    font-size: 9px;
    font-style: italic;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 20px;
    background: #FFFFFF;
    flex-shrink: 0;
    margin-top: 2px;
    white-space: nowrap;
  }
  .pill-Academia   { color: #4A30A0; border: 1.5px solid #B8A0F0; }
  .pill-Bellingham { color: #0A6830; border: 1.5px solid #5EE8A0; }
  .pill-GoodNews   { color: #0A6830; border: 1.5px solid #5EE8A0; }
  .pill-YouTube    { color: #805000; border: 1.5px solid #F5D060; }

  .card-body { flex: 1; min-width: 0; }

  h4.card-headline {
    font-family: Georgia, serif;
    font-size: 13px;
    font-weight: bold;
    color: #FFFFFF;
    line-height: 1.35;
    margin-bottom: 6px;
  }

  .card-summary {
    font-family: Georgia, serif;
    font-size: 11px;
    font-style: italic;
    color: #A0B8A8;
    line-height: 1.7;
    margin-bottom: 6px;
  }

  .card-source {
    font-family: Georgia, serif;
    font-size: 9px;
    color: #6A8870;
    margin-top: 2px;
    font-style: italic;
  }

  .card-link {
    display: inline-block;
    font-family: Georgia, serif;
    font-size: 10px;
    font-style: italic;
    margin-top: 6px;
    text-decoration: none;
  }
  .link-Academia   { color: #B8A0F0; }
  .link-Bellingham { color: #5EE8A0; }
  .link-GoodNews   { color: #5EE8A0; }
  .link-YouTube    { color: #F5D060; }
  .card-link:hover { text-decoration: underline; }

  .yt-embed {
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
    display: block;
    background: #0A0A0A;
    border-radius: 0 0 9px 9px;
  }

  .empty-state {
    background: #1A2620;
    border: 1px solid #2A3A30;
    border-radius: 10px;
    padding: 24px 16px;
    text-align: center;
    font-family: Georgia, serif;
    font-size: 14px;
    font-style: italic;
    color: #6A8870;
  }

  .status-bar {
    font-family: Georgia, serif;
    font-size: 10px;
    font-style: italic;
    color: #4A6A50;
    text-align: right;
    padding: 6px 14px 8px;
  }
</style>
</head>
<body>

<div class="widget-header">
  <div class="widget-header-dot"></div>
  <span class="widget-header-title">New + Good</span>
  <span class="widget-header-date" id="headerDate"></span>
</div>
<div class="widget-body">
  <div id="contentArea">
    <div class="empty-state">Loading…</div>
  </div>
</div>
<div class="status-bar" id="statusBar"></div>

<script>
const BAKED_DATA = {"updated":"2026-06-22T05:15:00Z","date":"2026-06-22","items":[{"category":"Academia","headline":"CCC 2027 CFP: 'Writing Pedagogy as Intellectual Fun, Emergence, and Joy'","summary":"College Composition and Communication's 2027 special issue invites scholarship on joy, play, and emergence in writing pedagogy. Submissions exploring multimodal, AI-integrated, and community-centered composition approaches are especially welcome. Deadline and full CFP details on the WPA Announcements site.","url":"https://wpa-announcements.tracigardner.com/2026/05/14/cfp-ccc-2027-special-issue-writing-pedagogy-as-intellectual-fun-emergence-and-joy/","source":"WPA Announcements / NCTE"},{"category":"Bellingham","headline":"As Spring Chinook Return, Lummi Nation Reflects on Hard-Fought Salmon Comeback","summary":"Spring chinook are returning to the Nooksack River in stronger numbers this season, marking a quiet conservation milestone. Years of Lummi Nation advocacy, habitat restoration work, and water quality efforts are beginning to show results. Cascadia Daily News reports on what this recovery means for the community and the river.","url":"https://www.cascadiadaily.com/2026/jun/18/as-spring-chinook-return-lummi-nation-reflects-on-hard-fought-salmon-comeback/","source":"Cascadia Daily News"},{"category":"Good News","headline":"LEGO Foundation Commits $97M to Play-Based Education for Children in Conflict Zones","summary":"The LEGO Foundation has announced a $97 million commitment to bring structured play-based learning to 1.5 million displaced children through a partnership with the International Rescue Committee. The initiative recognizes play as essential to child development and healing, particularly in crisis contexts where formal schooling is disrupted.","url":"https://www.goodgoodgood.co/articles/good-news-this-week-june-06-2026","source":"Good Good Good"},{"category":"YouTube","headline":"Relaxing Nature: Pacific Northwest 4K","summary":"A slow, meditative walk through old-growth forest, mossy river trails, and Pacific coastal light — filmed in 4K by Pierre Leclerc. A quiet visual break perfect for working hours or winding down. No narration, just ambient forest sound and water.","url":"https://www.youtube.com/watch?v=SPTalNRl9GU","source":"Pierre Leclerc Photography"}]};

const PILL_CLASS  = { 'Academia':'pill-Academia','Bellingham':'pill-Bellingham','Good News':'pill-GoodNews','YouTube':'pill-YouTube' };
const LINK_CLASS  = { 'Academia':'link-Academia','Bellingham':'link-Bellingham','Good News':'link-GoodNews','YouTube':'link-YouTube' };
const CAT_LABEL   = { 'Academia':'Academia','Bellingham':'Bellingham','Good News':'Good News','YouTube':'Watch' };

function ytVideoId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function renderItems(data) {
  const el = document.getElementById('contentArea');
  const dateEl = document.getElementById('headerDate');
  if (data.date) {
    const d = new Date(data.date + 'T12:00:00');
    dateEl.textContent = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }
  const items = (data.items || []).filter(i => i.category !== 'Literary');
  if (!items.length) { el.innerHTML = `<div class="empty-state">Nothing yet today — refreshes each morning.</div>`; return; }

  el.innerHTML = `<div class="card-list">${items.map(item => {
    const pillCls  = PILL_CLASS[item.category]  ?? 'pill-GoodNews';
    const linkCls  = LINK_CLASS[item.category]  ?? 'link-GoodNews';
    const label    = CAT_LABEL[item.category]   ?? item.category;
    const isYT     = item.category === 'YouTube';
    const videoId  = isYT ? ytVideoId(item.url) : null;
    const readMore = item.url
      ? `<a class="card-link ${linkCls}" href="${item.url}" target="_blank">Read more →</a>`
      : '';
    const watchMore = item.url
      ? `<a class="card-link ${linkCls}" href="${item.url}" target="_blank">Watch on YouTube →</a>`
      : '';

    if (isYT && videoId) return `
      <div class="card">
        <div class="card-top">
          <div class="cat-pill ${pillCls}">${label}</div>
          <div class="card-body">
            <h4 class="card-headline">${item.headline}</h4>
            <div class="card-summary">${item.summary ?? ''}</div>
            <div class="card-source">${item.source ?? ''}</div>
            ${watchMore}
          </div>
        </div>
        <iframe class="yt-embed" src="https://www.youtube.com/embed/${videoId}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>`;

    return `
      <div class="card">
        <div class="card-top">
          <div class="cat-pill ${pillCls}">${label}</div>
          <div class="card-body">
            <h4 class="card-headline">${item.headline}</h4>
            <div class="card-summary">${item.summary ?? ''}</div>
            <div class="card-source">${item.source ?? ''}</div>
            ${readMore}
          </div>
        </div>
      </div>`;
  }).join('')}</div>`;
}

function main() {
  renderItems(BAKED_DATA);
  const d = new Date(BAKED_DATA.date + 'T12:00:00');
  const dateStr = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('statusBar').textContent = `${dateStr} · Refreshes each morning`;
}
main();
</script>
</body>
</html>
