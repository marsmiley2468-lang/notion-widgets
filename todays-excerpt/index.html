  <div style="font-family:Georgia,serif;font-size:12px;line-height:1.9;color:#fff;font-style:italic;"><div style="min-height:1.4em;">The way a crow</div><div style="min-height:1.4em;">Shook down on me</div><div style="min-height:1.4em;">The dust of snow</div><div style="min-height:1.4em;">From a hemlock tree</div><div style="min-height:1.4em;">&nbsp;</div><div style="min-height:1.4em;">Has given my heart</div><div style="min-height:1.4em;">A change of mood</div><div style="min-height:1.4em;">And saved some part</div><div style="min-height:1.4em;">Of a day I had rued.</div></div>
