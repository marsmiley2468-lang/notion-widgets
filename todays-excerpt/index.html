<!DOCTYPE html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Todays Excerpt",
  "schemaVersion": 1,
  "description": "Daily literary excerpt — uplifting or nature poem under 15 lines. Option B: Sage & Stone theme. Bright white poem text, full day+month date.",
  "mcpTools": [],
  "mcpServerNames": []
}
</script>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today's Excerpt</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #1A2620;
    color: #FFFFFF;
    padding: 0;
    width: 100%;
  }

  .widget-header {
    background: #38503E;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    border-bottom: 1px solid #4A6650;
  }
  .widget-header-dot { width: 8px; height: 8px; border-radius: 50%; background: #5EE8A0; flex-shrink: 0; }
  .widget-header-title {
    font-family: Georgia, serif;
    font-size: 14px;
    font-weight: bold;
    font-style: italic;
    letter-spacing: 0.06em;
    color: #FFFFFF;
  }
  .widget-header-date {
    margin-left: auto;
    font-family: Georgia, serif;
    font-size: 10px;
    font-style: italic;
    color: #5EE8A0;
  }

  .widget-body {
    background: #1A2620;
    padding: 22px 24px;
    width: 100%;
  }

  .excerpt-title {
    font-family: Georgia, serif;
    font-size: 14px;
    font-weight: bold;
    color: #FFFFFF;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .excerpt-byline {
    font-family: Georgia, serif;
    font-size: 11px;
    font-style: italic;
    color: #F5D060;
    margin-bottom: 20px;
  }

  .excerpt-body {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 14px;
    line-height: 2.2;
    color: #FFFFFF;
    font-style: italic;
    white-space: pre-wrap;
    border-left: 2px solid #4A6650;
    padding-left: 18px;
    margin-bottom: 20px;
  }

  .excerpt-footer {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    padding-top: 8px;
    border-top: 1px solid #2A3A30;
  }

  .excerpt-source {
    font-family: Georgia, serif;
    font-size: 10px;
    font-style: italic;
    color: #6A8870;
    flex: 1;
  }

  .excerpt-link {
    font-family: Georgia, serif;
    font-size: 10px;
    font-style: italic;
    color: #5EE8A0;
    text-decoration: none;
  }
  .excerpt-link:hover { text-decoration: underline; }

  .empty-state {
    font-family: Georgia, serif;
    font-size: 13px;
    font-style: italic;
    color: #4A6A50;
    padding: 24px 0;
    text-align: center;
  }

  .status-bar {
    font-family: Georgia, serif;
    font-size: 10px;
    font-style: italic;
    color: #4A6A50;
    text-align: right;
    padding: 6px 24px 8px;
  }
</style>
</head>
<body>

<div class="widget-header">
  <div class="widget-header-dot"></div>
  <span class="widget-header-title">Today's Excerpt</span>
  <span class="widget-header-date" id="headerDate"></span>
</div>
<div class="widget-body" id="widgetBody">
  <div class="empty-state">Loading…</div>
</div>
<div class="status-bar" id="statusBar"></div>

<script>
const BAKED_LITERARY = {"date":"2026-06-22","title":"Joy","poet":"Stuart Kestenbaum","source":"Poetry Foundation","url":"https://www.poetryfoundation.org/poems/152784/joy-5e5017ba3348f","text":"The asters shake from stem to flower
waiting for the monarchs to alight.

Every butterfly knows that the end
is different from the beginning

and that it is always a part
of a longer story, in which we are always

transformed. When it's time to fly,
you know how, just the way you knew

how to breathe, just the way the air
knew to find its way into your lungs,

the way the geese know when to depart,
the way their wings know how to

speak to the wind, a partnership of feather
and glide, lifting into the blue dream."};

function main() {
  const body = document.getElementById('widgetBody');
  const statusEl = document.getElementById('statusBar');
  const dateEl = document.getElementById('headerDate');
  const data = BAKED_LITERARY;

  if (!data?.text) {
    body.innerHTML = `<div class="empty-state">No excerpt today — refreshes each morning.</div>`;
    return;
  }

  if (data.date) {
    const d = new Date(data.date + 'T12:00:00');
    const dateStr = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    dateEl.textContent = dateStr;
    statusEl.textContent = `${dateStr} · Refreshes each morning`;
  }

  body.innerHTML = `
    <div class="excerpt-title">${data.title ?? 'Untitled'}</div>
    <div class="excerpt-byline">${data.poet ?? ''}</div>
    <div class="excerpt-body">${data.text}</div>
    <div class="excerpt-footer">
      <div class="excerpt-source">${data.source ?? ''}</div>
      ${data.url ? `<a class="excerpt-link" href="${data.url}" target="_blank">Read full poem →</a>` : ''}
    </div>`;
}
main();
</script>
</body>
</html>
